<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Host-role checkbox — shadow label and help</title>
        <link rel="stylesheet" href="./page.css" />
    </head>
    <body>
        <main class="page">
            <p><a href="./index.html">← Host-role demos</a></p>

            <h1>Host-role checkbox</h1>
            <p class="lead">
                <code>role="checkbox"</code> and <code>aria-checked</code> on the custom element
                host. Label and help live in Shadow DOM and are wired through
                <code>ElementInternals</code> element references.
            </p>

            <div id="support-status" class="status" aria-live="polite"></div>

            <section class="demo-card" aria-labelledby="checkbox-heading">
                <h2 id="checkbox-heading">Checkbox</h2>
                <checkbox-host-refs data-aria-log="checkbox-shadow"></checkbox-host-refs>
                <h3>Resolved ARIA references</h3>
                <pre class="log" data-aria-log="checkbox-shadow" aria-live="polite"></pre>
            </section>
        </main>

        <script type="module">
            import { renderSupportStatus } from './form-field-base.js';
            import './checkbox-host-refs.js';

            renderSupportStatus(document.getElementById('support-status'));
        </script>
    </body>
</html>
